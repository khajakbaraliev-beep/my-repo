<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Coin Hover Flip</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#020617;
    font-family:sans-serif;
    color:white;
}

.scene{
    perspective:1000px;
}

.coin{
    width:150px;
    height:150px;
    position:relative;
    transform-style:preserve-3d;
    transition:0.8s;
}

.scene:hover .coin{
    transform:rotateY(180deg);
}

.side{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    font-weight:bold;
    backface-visibility:hidden;
}

.front{
    background:radial-gradient(circle at 30% 30%, #facc15, #ca8a04);
    box-shadow:0 0 20px gold;
}

.back{
    background:radial-gradient(circle at 30% 30%, #38bdf8, #1d4ed8);
    transform:rotateY(180deg);
}
</style>

</head>
<body>

<div class="scene">
    <div class="coin">
        <div class="side front">HEAD</div>
        <div class="side back">TAIL</div>
    </div>
</div>

</body>
</html>
