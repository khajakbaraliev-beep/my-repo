<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS Shop | My Team</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;800&display=swap');

        /* Umumiy Sozlamalar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
            list-style: none;
        }

        body {
            background: linear-gradient(-45deg, #4a121a, #113a6f, #431f5e, #050505);
            background-size: 400% 400%;
            animation: gradient-bg 15s ease infinite;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        @keyframes gradient-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 1 va 2-sahifalar bilan BIR XIL: Chap Menyu (Sidebar) */
        aside {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: rgba(15, 10, 25, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 1000;
            transition: all 0.4s ease;
        }

        .logo img {
            width: 100%;
            max-width: 180px;
            border-radius: 15px;
            border: 2px solid rgba(255, 215, 0, 0.4);
            transition: transform 0.3s ease;
            display: block;
            margin: 0 auto 30px;
        }

        .logo img:hover {
            transform: scale(1.05) rotate(2deg);
            border-color: gold;
        }

        aside ul li {
            margin-bottom: 15px;
        }

        aside ul li a {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.8);
            display: block;
            padding: 10px 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-align: center;
            letter-spacing: 1px;
        }

        aside ul li a:hover {
            background: linear-gradient(90deg, #1b5db0, #6e3399);
            color: #fff;
            text-shadow: 0 0 8px #ffcc00;
            transform: translateX(5px);
        }

        .inp {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .inp:focus {
            border-color: aquamarine;
            background: rgba(255,255,255,0.2);
        }

        .topbar {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .topbar div {
            margin: 5px 0;
        }

        /* Asosiy Kontent Maydoni */
        main {
            margin-left: 260px;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .content-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 2px;
            color: #fff;
            margin-bottom: 20px;
        }

        p {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 1px;
            color: #ffcc00;
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(0.98); opacity: 0.8; }
            100% { transform: scale(1.02); opacity: 1; }
        }

        /* Mobil qurilmalar uchun moslashuvchanlik */
        @media (max-width: 992px) {
            aside {
                position: relative;
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                padding: 20px;
            }

            aside ul {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
                margin: 15px 0;
            }

            aside ul li { margin-bottom: 0; }

            main {
                margin-left: 0;
                padding: 20px;
            }
            
            h1 { font-size: 2.5rem; }
            p { font-size: 1.8rem; }
        }
    </style>
</head>

<body>

    <aside>
        <header>
            <div class="logo">
                <img src="https://i.ytimg.com/vi/4krOQ_EcW7Y/maxresdefault.jpg" alt="DLS Shop Logo">
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html">Players</a></li>
                <li><a href="club.html">Club</a></li>
                <li><a href="myclub.html">My Club</a></li>
                <li><a href="legenbords.html">Leaderboards</a></li>
            </ul>
        </header>
        
        <div>
            <input class="inp" type="text" placeholder="Search o'yinchilar...">
            <div class="topbar" style="margin-top: 15px;">
                <div>💰 12,500</div>
                <div>🏆 4.5 ⭐⭐⭐⭐⭐</div>
            </div>
        </div>
    </aside>

    <main>
        <section class="content-box">
            <h1>YOUR TEAM</h1>
            <p>YOUR CLUB IS EMPTY. GO TO THE SHOP TO BUY PLAYERS!</p>
        </section>
    </main>

</body>

</html>
