<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Infinite Slider</title>

  <style>
    body {
      margin: 0;
      background: #020617;
      color: white;
      font-family: sans-serif;
    }

    .slider-wrap {
      overflow: hidden;
      width: 100%;
      padding: 20px 0;
    }

    .slider-track {
      display: flex;
      width: calc(250px * 10);
      animation: scroll 15s linear infinite;
    }

    .slide {
      width: 350px;
      height: 320px;
      margin-right: 15px;
      background: linear-gradient(135deg, #22c55e, #4ade80);
      border-radius: 15px;
      padding: 15px;
      flex-shrink: 0;
    }

    .slide h3 {
      margin: 0;
      font-size: 18px;
    }

    @keyframes scroll {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(calc(-250px * 5));
      }
    }

    .btn {
      width: 40px;
      height: 20px;
      background-color: black;
      color: white;
    }
  </style>

</head>

<body>

  <h2 style="text-align:center;">🔥 SUPER OFFER </h2>

  <div class="slider-wrap">
    <div class="slider-track">

      <div class="slide">
        <h3><img src="https://i.ytimg.com/vi/17nPpMYku2k/hqdefault.jpg" alt=""><button class="btn">Buy</button></h3>
      </div>
      <div class="slide">
        <h3><img src="https://i.ytimg.com/vi/17nPpMYku2k/hqdefault.jpg" alt=""><button class="btn">Buy</button></h3>
      </div>
      <div class="slide">
        <h3><img src="https://i.ytimg.com/vi/17nPpMYku2k/hqdefault.jpg" alt=""><button class="btn">Buy</button></h3>
      </div>
      <div class="slide">
        <h3><img src="https://i.ytimg.com/vi/17nPpMYku2k/hqdefault.jpg" alt=""><button class="btn">Buy</button></h3>
      </div>

      <div class="slide">
        <h3><img src="https://i.ytimg.com/vi/17nPpMYku2k/hqdefault.jpg" alt=""><button class="btn">Buy</button></h3>
      </div>
      <div class="slide">
        <h3><img src="https://i.ytimg.com/vi/17nPpMYku2k/hqdefault.jpg" alt=""><button class="btn">Buy</button></h3>
      </div>
      <div class="slide">
        <h3><img src="https://i.ytimg.com/vi/17nPpMYku2k/hqdefault.jpg" alt=""><button class="btn">Buy</button></h3>
      </div>
      <div class="slide">
        <h3><img src="https://i.ytimg.com/vi/17nPpMYku2k/hqdefault.jpg" alt=""><button class="btn">Buy</button></h3>
      </div>
    </div>
  </div>

</body>

</html>
