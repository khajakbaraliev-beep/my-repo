<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS Shop | Daily Rewards</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
            list-style: none;
        }

        body {
            background: linear-gradient(-45deg, #4a121a, #113a6f, #431f5e, #050505);
            background-size: 400% 400%;
            animation: gradient-bg 15s ease infinite;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        @keyframes gradient-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* shop-items.html dan olingan Sidebar */
        aside {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: rgba(15, 10, 25, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 1000;
        }

        .logo img {
            width: 100%;
            max-width: 180px;
            border-radius: 15px;
            border: 2px solid rgba(255, 215, 0, 0.4);
            transition: transform 0.3s ease;
            display: block;
            margin: 0 auto 30px;
        }

        .logo img:hover {
            transform: scale(1.05) rotate(2deg);
            border-color: gold;
        }

        aside ul li {
            margin-bottom: 15px;
        }

        aside ul li a {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.8);
            display: block;
            padding: 10px 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-align: center;
            letter-spacing: 1px;
        }

        aside ul li a:hover, aside ul li a.active {
            background: linear-gradient(90deg, #1b5db0, #6e3399);
            color: #fff;
            text-shadow: 0 0 8px #ffcc00;
            transform: translateX(5px);
        }

        .inp {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        .topbar {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .topbar div {
            margin: 5px 0;
        }

        /* Asosiy Kontent */
        main {
            margin-left: 260px;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .rewards-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #ffcc00, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1rem;
            color: #ccc;
            margin-bottom: 40px;
        }

        .gift-box {
            font-size: 6rem;
            margin-bottom: 25px;
            display: inline-block;
            animation: shake 2s infinite ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg) translateY(0); }
            25% { transform: rotate(-5deg) translateY(-5px); }
            75% { transform: rotate(5deg) translateY(-5px); }
        }

        .reward-info-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px dashed rgba(0, 255, 204, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 30px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #e0e0e0;
        }

        .reward-info-box strong {
            color: #00ffcc;
        }

        .claim-btn {
            display: inline-block;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #00ffcc, #0099ff);
            color: #050505;
            border: none;
            padding: 12px 45px;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 1px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4);
            transition: all 0.3s ease;
        }

        .claim-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(0, 255, 204, 0.7);
            background: linear-gradient(135deg, #ffcc00, #ff00ff);
            color: #fff;
        }

        /* Mobil */
        @media (max-width: 768px) {
            aside { width: 70px; padding: 20px 10px; }
            aside .logo, aside input, aside .topbar, aside ul li a { display: none; }
            main { margin-left: 70px; padding: 20px; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>

<body>

    <!-- shop-items.html dan olingan Sidebar -->
    <aside>
        <header>
            <div class="logo">
                <img src="https://i.ytimg.com/vi/4krOQ_EcW7Y/maxresdefault.jpg" alt="DLS Shop Logo">
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html">Players</a></li>
                <li><a href="club.html">Club</a></li>
                <li><a href="myclub.html">My Club</a></li>
                <li><a href="legenbords.html">Leaderboards</a></li>
                <li><a href="rewards.html" class="active">Daily Rewards</a></li>
                <li><a href="shop-items.html">Items Shop</a></li>
            </ul>
        </header>

        <div>
            <input class="inp" type="text" placeholder="Jihoz qidirish...">
            <div class="topbar" style="margin-top: 15px;">
                <div>💰 12,500</div>
                <div>💎 150</div>
            </div>
        </div>
    </aside>

    <!-- Asosiy Kontent -->
    <main>
        <section class="rewards-container">
            <h1>DAILY REWARDS</h1>
            <p class="subtitle">Get free coins every 24 hours to build your dream team!</p>
            
            <div class="gift-box">🎁</div>
            
            <div class="reward-info-box">
                Log in every day to claim your <strong>FREE 500 COINS</strong> reward! Next reward will be available in 24 hours.
            </div>
            
            <a href="index.html" class="claim-btn">CLAIM 500 COINS</a>
        </section>
    </main>

</body>
</html>
