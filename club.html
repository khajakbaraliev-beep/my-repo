<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS Clubs Shop</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;800&display=swap');

        /* Umumiy Sozlamalar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
            list-style: none;
        }

        body {
            background: linear-gradient(-45deg, #4a121a, #113a6f, #431f5e, #050505);
            background-size: 400% 400%;
            animation: gradient-bg 15s ease infinite;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        @keyframes gradient-bg {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* 1-sahifa bilan BOSHQA BIR XIL: Chap Menyu (Sidebar) */
        aside {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: rgba(15, 10, 25, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 1000;
            transition: all 0.4s ease;
        }

        .logo img {
            width: 100%;
            max-width: 180px;
            border-radius: 15px;
            border: 2px solid rgba(255, 215, 0, 0.4);
            transition: transform 0.3s ease;
            display: block;
            margin: 0 auto 30px;
        }

        .logo img:hover {
            transform: scale(1.05) rotate(2deg);
            border-color: gold;
        }

        aside ul li {
            margin-bottom: 15px;
        }

        aside ul li a {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.8);
            display: block;
            padding: 10px 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-align: center;
            letter-spacing: 1px;
        }

        aside ul li a:hover {
            background: linear-gradient(90deg, #1b5db0, #6e3399);
            color: #fff;
            text-shadow: 0 0 8px #ffcc00;
            transform: translateX(5px);
        }

        .inp {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .inp:focus {
            border-color: aquamarine;
            background: rgba(255, 255, 255, 0.2);
        }

        .topbar {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: #fff;
        }

        .topbar div {
            margin: 5px 0;
            color: #fff;
        }

        /* Asosiy kontent qismi */
        main {
            margin-left: 260px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* Klasterlar konteyneri */
        .clubs {
            display: flex;
            flex-direction: column;
            gap: 40px;
            width: 100%;
            max-width: 1000px;
        }

        /* Har bir qator */
        .club-con {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        /* Har bir klub kartasi */
        .club-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            flex: 1;
            min-width: 280px;
            max-width: 450px;
            backdrop-filter: blur(5px);
        }

        .club-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 215, 0, 0.3);
        }

        /* Rasm konteyneri va rasmning o'zi */
        .clublar {
            width: 100%;
            overflow: hidden;
            border-radius: 12px;
        }

        .clublar img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .club-card:hover .clublar img {
            transform: scale(1.06);
        }

        /* Narxlar stili */
        .price {
            color: #ffcc00;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 1px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>

<body>

    <aside>
        <header>
            <div class="logo">
                <img src="https://i.ytimg.com/vi/4krOQ_EcW7Y/maxresdefault.jpg" alt="DLS Shop Logo">
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html">Players</a></li>
                <li><a href="club.html">Club</a></li>
                <li><a href="myclub.html">My Club</a></li>
                <li><a href="legenbords.html">Leaderboards</a></li>
                <li><a href="rewards.html">Daily Rewards</a></li>
                <li><a href="shop-items.html" class="active">Items Shop</a></li>
            </ul>
        </header>

        <div>
            <input class="inp" type="text" placeholder="Search o'yinchilar...">
            <div class="topbar" style="margin-top: 15px;">
                <div>💰 12,500</div>
                <div>🏆 4.5 ⭐⭐⭐⭐⭐</div>
            </div>
        </div>
    </aside>

    <main>
        <section class="clubs">
            <div class="club-con">
                <div class="club-card">
                    <div class="clublar"><img src="Dreamtean.png" alt="Dream Team"></div>
                    <span class="price">Price: 30 coin 💰💰 Name: Dream fc</span>
                </div>

                <div class="club-card">
                    <div class="clublar"><img src="alievteam.png" alt="Aliev Team"></div>
                    <span class="price">Price: 3000 coin 💰💰 Name: Dream fc</span>
                </div>
            </div>

            <div class="club-con">
                <div class="club-card">
                    <div class="clublar"><img src="dlsacc.png" alt="DLS Acc"></div>
                    <span class="price">Price: 100 coin 💰💰 Name: Dream fc</span>
                </div>

                <div class="club-card">
                    <div class="clublar"><img src="accdls.png" alt="Acc DLS"></div>
                    <span class="price">Price: 20 coin 💰💰 Name: Dream fc</span>
                </div>
            </div>
        </section>
    </main>

</body>

</html>
