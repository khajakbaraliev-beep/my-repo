<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS Shop | Buy Players</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;800&display=swap');

        /* Umumiy Sozlamalar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
            list-style: none;
        }

        body {
            background: linear-gradient(-45deg, #4a121a, #113a6f, #431f5e, #050505);
            background-size: 400% 400%;
            animation: gradient-bg 15s ease infinite;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        @keyframes gradient-bg {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* 1, 2, 3 va 4-sahifalar bilan BIR XIL: Chap Menyu (Sidebar) */
        aside {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: rgba(15, 10, 25, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 1000;
            transition: all 0.4s ease;
        }

        .logo img {
            width: 100%;
            max-width: 180px;
            border-radius: 15px;
            border: 2px solid rgba(255, 215, 0, 0.4);
            transition: transform 0.3s ease;
            display: block;
            margin: 0 auto 30px;
        }

        .logo img:hover {
            transform: scale(1.05) rotate(2deg);
            border-color: gold;
        }

        aside ul li {
            margin-bottom: 15px;
        }

        aside ul li a {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.8);
            display: block;
            padding: 10px 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-align: center;
            letter-spacing: 1px;
        }

        aside ul li a:hover {
            background: linear-gradient(90deg, #1b5db0, #6e3399);
            color: #fff;
            text-shadow: 0 0 8px #ffcc00;
            transform: translateX(5px);
        }

        .inp {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .inp:focus {
            border-color: aquamarine;
            background: rgba(255, 255, 255, 0.2);
        }

        .topbar {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .topbar div {
            margin: 5px 0;
        }

        /* Asosiy Kontent Maydoni */
        main {
            margin-left: 260px;
            padding: 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        section {
            width: 100%;
            max-width: 900px;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            color: white;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-align: center;
            background: linear-gradient(45deg, #00ffcc, #ffcc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* O'yinchilar Kartalari Konteyneri */
        .sold-con {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 5px;
        }

        .sold-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            width: 280px;
            backdrop-filter: blur(5px);
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .sold-card:hover {
            transform: translateY(-10px);
            border-color: #ff00ff;
            box-shadow: 0 10px 25px rgba(255, 0, 255, 0.3);
        }

        .sold-card img {
            width: 100%;
            height: 220px;
            object-fit: contain;
            border-radius: 12px;
        }

        .price {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            color: gold;
            margin-top: 15px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }

        /* Statistika Jadvali */
        table {
            margin-top: 50px;
            width: 100%;
            max-width: 700px;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            color: white;
            font-family: 'Montserrat', sans-serif;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        th,
        td {
            padding: 15px;
            text-align: center;
        }

        th {
            background: linear-gradient(135deg, #6e3399, #1b5db0);
            font-family: 'Bebas Neue', sans-serif;
            color: gold;
            font-size: 1.5rem;
            letter-spacing: 1px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        td {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.8;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
        }

        tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>

<body>

    <aside>
        <header>
            <div class="logo">
                <img src="https://i.ytimg.com/vi/4krOQ_EcW7Y/maxresdefault.jpg" alt="DLS Shop Logo">
            </div>
            <ul>
                <li><a href="index.html">back Home</a></li>

            </ul>
        </header>

        <div>
            <input class="inp" type="text" placeholder="Search o'yinchilar...">
            <div class="topbar" style="margin-top: 15px;">
                <div>💰 12,500</div>
                <div>🏆 4.5 ⭐⭐⭐⭐⭐</div>
            </div>
        </div>
    </aside>

    <main>
        <section>
            <h1>Buy offer 💎💎💎</h1>

            <div class="sold-con">
                <div class="sold-card">
                    <img src="anderson.png" alt="Elliot Anderson">
                    <div class="price">Price 💰: 1200</div>
                </div>

                <div class="sold-card">
                    <img src="el.png" alt="Souffan El Karauani">
                    <div class="price">Price 💰: 950</div>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ELLIOT ANDERSON</th>
                        <th>SOUFFAN EL KARAUANI</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            Shooting: 62 <br>
                            Speed: 82 <br>
                            Stamina: 90
                        </td>
                        <td>
                            Shooting: 70 <br>
                            Speed: 76 <br>
                            Stamina: 89
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

</body>

</html>
