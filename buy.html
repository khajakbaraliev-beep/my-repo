<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUY PLAYERS</title>
</head>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Oswald:wght@400;700&display=swap');

    * {
        text-decoration: none;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        list-style: none;
    }

    body {
        overflow-x: hidden;
        background: linear-gradient(#7B192A, #1B5DB0);
        background-attachment: fixed;
    }

    aside {
        position: fixed;
        top: 0;
        left: 0;
        width: 250px;
        height: 100vh;
        background: rgb(110, 51, 153);
        padding: 20px;
    }

    main {
        margin-left: 250px;
        padding: 20px;
    }

    header li h3 {
        font-family: 'Oswald', sans-serif;
        padding: 25px;
    }

    header li h3 a {
        color: deepskyblue;
        transition: .3s;
    }

    header li h3 a:hover {
        color: white;
    }

    .logo img {
        width: 200px;
        border: solid;
        border-radius: 20%;
        transition: 0.5s;
    }

    .logo img:hover {
        transform: scale(1.15);
    }


    .sold-con {
        display: flex;
        gap: 40px;
        flex-wrap: wrap;
    }

    .sold-card {
        width: 400px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 15px;
        padding: 15px;
        text-align: center;
    }

    .sold-card img {
        width: 100%;
        height: 250px;
        border-radius: 15px;
    }

    .price {
        font-size: 30px;
        font-family: 'Oswald', sans-serif;
        color: gold;
        margin-top: 15px;
    }

    h1 {
        color: white;
        font-family: 'Oswald', sans-serif;
        margin-bottom: 20px;
    }

    table {
        margin-top: 400px;
        width: 80%;
        border-collapse: collapse;
        background-color: rgba(255, 255, 255, 0.08);
        color: white;
        font-family: 'Oswald', sans-serif;
        font-size: 20px;
        border-radius: 10px;
        margin-left: 300px;
        margin-bottom: 30px;
    }

    th,
    td {
        padding: 15px;
        text-align: center;
        border: 1px solid deepskyblue;
    }

    th {
        background-color: blueviolet;
        color: gold;
        font-size: 24px;
    }

    td {
        background-color: rgba(255, 255, 255, 0.05);
    }
</style>

<body>

    <aside>
        <header>

            <li>
                <h3><a href="server1.html">Back to Home</a></h3>
            </li>
        </header>
    </aside>

    <main>
        <section>
            <h1>Buy offer 💎💎💎:</h1>

            <div class="sold-con">

                <div class="sold-card">
                    <img src="anderson.png" alt="">
                    <div class="price">Price 💰: 1200</div>
                </div>

                <div class="sold-card">
                    <img src="el.png" alt="">
                    <div class="price">Price 💰: 950</div>
                </div>

            </div>
        </section>
    </main>
    <table>
        <tr>
            <th>SOUFFAN EL KARAUANI</th>
            <th>ELLIOT ANDERSON</th>
        </tr>
        <tr>
            <td>
                Shooting: 70 <br>
                Speed: 76 <br>
                Stamina: 89
            </td>
            <td>
                Shooting: 62 <br>
                Speed: 82 <br>
                Stamina: 90
            </td>
        </tr>
    </table>


</body>

</html>
