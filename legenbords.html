<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        list-style: none;
        text-decoration: none;
        color: greenyellow;
    }
    .logo{
        border-radius: 10px;
    }
    .logo img{
        border-radius: 30px;
        width: 190px;
        height: 150px;
    }
    body{
        background: linear-gradient(red, blue);
        background-attachment: fixed;
    }
    aside {
        position: fixed;
        top: 0;
        left: 0;
        width: 250px;
        height: 100vh;
        background: rgba(110, 51, 153, 0.5);
        backdrop-filter: blur(10px);
        padding: 20px;
        border-right: 1px solid rgba(255, 255, 255, 0.2);
    }

    main {
        margin-left: 250px;
        padding: 20px;
    }
    h1{
        position: absolute;
        top: 5%;
        left: 50%;
    }
    p{
        font-size: 70px;
        top: 40%;
        position: absolute;
        left: 42%;
    }
    ul li{
        padding-top: 70px;
    }
    .topbar{
        padding-top: 30px;
    }
    .topbar div {
        padding-top: 20px;
    }
    aside:hover{
        background: linear-gradient(blue, red);
    }
</style>

<body>
    <aside>
        <header>
            <ul>
                <li>
                    <a href="index.html"><--BACK HOME</a>
                </li>
            </ul>


        </header>
    </aside>
    <main>
        <section>
            <h1>Legenbords</h1>
            <p>COMING SOON!</p>
        </section>
    </main>
</body>

</html>
